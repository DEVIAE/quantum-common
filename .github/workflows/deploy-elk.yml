# =============================================================================
# Quantum ELK Stack - Deploy to OpenShift
# R24: CI/CD para pipeline y configuraciones ELK
# R11: Versionado del pipeline
# =============================================================================

name: Deploy ELK Stack to OpenShift

on:
  push:
    branches: [main, develop]
    paths:
      - "docker/**"
      - "k8s/**"
      - ".github/workflows/deploy-elk.yml"
  workflow_dispatch:

env:
  OPENSHIFT_SERVER: https://api.rm1.0a51.p1.openshiftapps.com:6443
  OPENSHIFT_PROJECT: felipesoto-dev

jobs:
  deploy-elk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install OpenShift CLI
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: latest

      - name: Login to OpenShift
        run: |
          oc login --token=${{ secrets.OPENSHIFT_TOKEN }} --server=${{ env.OPENSHIFT_SERVER }}
          oc project ${{ env.OPENSHIFT_PROJECT }}

      - name: Create/Update Secrets
        run: |
          oc apply -f k8s/elk-secrets.yaml

      - name: Deploy Elasticsearch
        run: |
          oc apply -f k8s/elasticsearch.yaml
          echo "Waiting for Elasticsearch rollout..."
          # Force pod recreation if stuck in CrashLoopBackOff
          ES_POD=$(oc get pods -l app=quantum-elasticsearch -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -n "$ES_POD" ]; then
            POD_STATUS=$(oc get pod $ES_POD -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
            RESTART_COUNT=$(oc get pod $ES_POD -o jsonpath='{.status.containerStatuses[0].restartCount}' 2>/dev/null || echo "0")
            if [ "$RESTART_COUNT" -gt 3 ] 2>/dev/null; then
              echo "Pod has $RESTART_COUNT restarts, deleting to force recreation with new spec..."
              oc delete pod $ES_POD --grace-period=0 --force 2>/dev/null || true
            fi
          fi
          oc rollout status statefulset/quantum-elasticsearch --timeout=5m || true

      - name: Create Logstash ConfigMaps
        run: |
          # Pipeline configs
          oc create configmap quantum-logstash-pipeline \
            --from-file=docker/logstash/pipeline/ \
            --dry-run=client -o yaml | oc apply -f -

          # Logstash config (pipelines.yml)
          oc create configmap quantum-logstash-config \
            --from-file=pipelines.yml=docker/logstash/config/pipelines.yml \
            --dry-run=client -o yaml | oc apply -f -

          # Logstash settings (logstash.yml)
          oc create configmap quantum-logstash-settings \
            --from-file=logstash.yml=docker/logstash/config/logstash.yml \
            --dry-run=client -o yaml | oc apply -f -

      - name: Deploy Logstash
        run: |
          oc apply -f k8s/logstash.yaml
          oc rollout status deployment/quantum-logstash --timeout=5m || true

      - name: Deploy Kibana
        run: |
          oc apply -f k8s/kibana.yaml
          oc rollout status deployment/quantum-kibana --timeout=5m || true

      - name: Wait for Elasticsearch Ready
        run: |
          echo "Waiting for Elasticsearch pod to be ready..."
          oc wait --for=condition=Ready pod -l app=quantum-elasticsearch --timeout=300s

      - name: Setup Built-in User Passwords
        run: |
          ES_POD=$(oc get pods -l app=quantum-elasticsearch -o jsonpath='{.items[0].metadata.name}')
          ELASTIC_PW=$(oc get secret quantum-elk-secrets -o jsonpath='{.data.elastic-password}' | base64 -d)
          KIBANA_PW=$(oc get secret quantum-elk-secrets -o jsonpath='{.data.kibana-password}' | base64 -d)
          LOGSTASH_PW=$(oc get secret quantum-elk-secrets -o jsonpath='{.data.logstash-password}' | base64 -d)

          echo "Setting kibana_system password..."
          oc exec $ES_POD -- bash -c "printf '%s' '{\"password\":\"'$KIBANA_PW'\"}' > /tmp/pw.json && \
            curl -sf -u elastic:\$ELASTIC_PASSWORD -X POST http://localhost:9200/_security/user/kibana_system/_password \
            -H 'Content-Type: application/json' -d @/tmp/pw.json"
          echo " Done"

          echo "Setting logstash_system password..."
          oc exec $ES_POD -- bash -c "printf '%s' '{\"password\":\"'$LOGSTASH_PW'\"}' > /tmp/pw.json && \
            curl -sf -u elastic:\$ELASTIC_PASSWORD -X POST http://localhost:9200/_security/user/logstash_system/_password \
            -H 'Content-Type: application/json' -d @/tmp/pw.json"
          echo " Done"

          # Cleanup
          oc exec $ES_POD -- rm -f /tmp/pw.json

      - name: Run ELK Setup (ILM, Templates, RBAC)
        run: |
          ES_POD=$(oc get pods -l app=quantum-elasticsearch -o jsonpath='{.items[0].metadata.name}')
          # Run init script
          oc cp docker/setup/init-elk.sh $ES_POD:/tmp/init-elk.sh
          oc exec $ES_POD -- bash /tmp/init-elk.sh

      - name: Verify ELK Deployment
        run: |
          echo "=== ELK Pods ==="
          oc get pods -l component=elk
          echo "=== ELK Services ==="
          oc get svc elasticsearch logstash kibana
          echo "=== Kibana Route ==="
          oc get route quantum-kibana || echo "No route created"

      # R16: Registro de cambios
      - name: Tag deployment version
        run: |
          DEPLOY_TAG="elk-$(date +%Y%m%d-%H%M%S)"
          echo "Deployment tagged: $DEPLOY_TAG"
