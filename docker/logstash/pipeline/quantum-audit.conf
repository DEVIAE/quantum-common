# =============================================================================
# Quantum Audit Pipeline
# R21: Sistema de auditoria
# R27: Tracking de fallos de pods
# =============================================================================

input {
  tcp {
    port => 5001
    codec => json_lines
    type => "quantum-audit"
  }
}

filter {
  if [type] == "quantum-audit" {
    mutate {
      add_field => {
        "[@metadata][index_prefix]" => "quantum-audit"
      }
    }

    # Enriquecer eventos de auditoria
    date {
      match => ["@timestamp", "ISO8601"]
      target => "@timestamp"
    }

    # Clasificar tipo de evento de auditoria
    if [audit.action] {
      mutate {
        add_field => { "audit.category" => "user_action" }
      }
    }

    if [audit.type] == "pod_failure" {
      mutate {
        add_tag => ["pod_failure"]
        add_field => {
          "alert.severity" => "critical"
          "alert.type" => "pod_failure"
        }
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "quantum-audit-%{+YYYY.MM.dd}"
    ilm_enabled => true
    ilm_rollover_alias => "quantum-audit"
    ilm_policy => "quantum-audit-policy"
  }
}
