# =============================================================================
# Quantum Logs Pipeline
# R1: Pipeline de ingesta de logs desde microservicios
# R2: Procesamiento en tiempo real
# R3: Campos indexados definidos
# =============================================================================

input {
  # Logback Logstash Encoder (TCP)
  tcp {
    port => 5000
    codec => json_lines
    type => "quantum-log"
  }
}

filter {
  # R3: Definicion de campos a indexar

  # Parsear timestamp ISO 8601
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Enriquecer con campos del servicio
  if [serviceName] {
    mutate {
      add_field => {
        "[@metadata][index_prefix]" => "quantum-logs-%{serviceName}"
      }
    }
  } else {
    mutate {
      add_field => {
        "[@metadata][index_prefix]" => "quantum-logs-unknown"
      }
    }
  }

  # R3: Campos estandarizados para busqueda
  mutate {
    rename => {
      "level" => "log.level"
      "logger_name" => "log.logger"
      "thread_name" => "process.thread.name"
      "stack_trace" => "error.stack_trace"
      "message" => "log.message"
    }
  }

  # Extraer campos de negocio de MDC
  if [mdc] {
    mutate {
      rename => {
        "[mdc][chunkId]" => "quantum.chunk.id"
        "[mdc][fileName]" => "quantum.file.name"
        "[mdc][chunkIndex]" => "quantum.chunk.index"
        "[mdc][totalChunks]" => "quantum.chunk.total"
        "[mdc][processInstanceId]" => "quantum.process.id"
        "[mdc][traceId]" => "trace.id"
        "[mdc][spanId]" => "span.id"
        "[mdc][correlationId]" => "quantum.correlation.id"
      }
    }
  }

  # R4: Detectar patrones anomalos - marcar errores para alertas
  if [log.level] == "ERROR" {
    mutate {
      add_tag => ["error_detected"]
      add_field => { "alert.severity" => "high" }
    }
  }

  if [log.level] == "WARN" {
    mutate {
      add_tag => ["warning_detected"]
      add_field => { "alert.severity" => "medium" }
    }
  }

  # Detectar patron de chunk fallido
  if [log.message] =~ /(?i)failed.*chunk|chunk.*fail/ {
    mutate {
      add_tag => ["chunk_failure"]
      add_field => { "alert.type" => "chunk_processing_failure" }
    }
  }

  # Detectar patron de DLQ
  if [log.message] =~ /(?i)DLQ|dead.letter/ {
    mutate {
      add_tag => ["dlq_event"]
      add_field => { "alert.type" => "dead_letter_queue" }
    }
  }

  # R27: Tracking de fallos - enriquecer con info de fallo
  if "error_detected" in [tags] {
    ruby {
      code => '
        event.set("error.timestamp", event.get("@timestamp"))
        event.set("error.service", event.get("serviceName") || "unknown")
      '
    }
  }

  # Convertir tipos numericos
  if [quantum.chunk.index] {
    mutate {
      convert => {
        "quantum.chunk.index" => "integer"
        "quantum.chunk.total" => "integer"
      }
    }
  }

  # Geo-IP si hay IP disponible (opcional)
  if [client.ip] {
    geoip {
      source => "client.ip"
      target => "client.geo"
    }
  }
}

output {
  # Enviar a Elasticsearch con indice dinamico por servicio
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    # R12: ILM policy aplicada automaticamente
    index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
    ilm_enabled => true
    ilm_rollover_alias => "quantum-logs"
    ilm_pattern => "{now/d}-000001"
    ilm_policy => "quantum-logs-policy"
  }

  # Debug output (desactivar en produccion)
  # stdout { codec => rubydebug }
}
