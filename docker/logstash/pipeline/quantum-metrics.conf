# =============================================================================
# Quantum Metrics Pipeline
# R17: Metricas de rendimiento y uso del sistema
# R28: Monitoreo de recursos
# =============================================================================

input {
  # Metricas de Prometheus scraped por Metricbeat
  http {
    port => 5044
    codec => json
    type => "quantum-metric"
  }
}

filter {
  # Parsear metricas de microservicios
  if [type] == "quantum-metric" {
    mutate {
      add_field => {
        "[@metadata][index_prefix]" => "quantum-metrics"
      }
    }

    # Convertir campos numericos de metricas
    if [value] {
      mutate {
        convert => { "value" => "float" }
      }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    index => "quantum-metrics-%{+YYYY.MM.dd}"
    ilm_enabled => true
    ilm_rollover_alias => "quantum-metrics"
    ilm_policy => "quantum-metrics-policy"
  }
}
