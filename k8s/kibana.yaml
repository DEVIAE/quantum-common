# =============================================================================
# Quantum Kibana - Kubernetes Deployment
# R2: Visualizacion + R4: Alertas + R14: Autenticacion
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantum-kibana
  labels:
    app: quantum-kibana
    component: elk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: quantum-kibana
  template:
    metadata:
      labels:
        app: quantum-kibana
        component: elk
    spec:
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:8.13.0
          ports:
            - containerPort: 5601
              name: http
          env:
            - name: ELASTICSEARCH_HOSTS
              value: "http://elasticsearch:9200"
            - name: ELASTICSEARCH_USERNAME
              value: kibana_system
            - name: ELASTICSEARCH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: quantum-elk-secrets
                  key: kibana-password
            - name: XPACK_SECURITY_ENABLED
              value: "true"
            - name: XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY
              valueFrom:
                secretKeyRef:
                  name: quantum-elk-secrets
                  key: kibana-encryption-key
            - name: XPACK_SECURITY_ENCRYPTIONKEY
              valueFrom:
                secretKeyRef:
                  name: quantum-elk-secrets
                  key: kibana-security-key
            - name: XPACK_REPORTING_ENCRYPTIONKEY
              valueFrom:
                secretKeyRef:
                  name: quantum-elk-secrets
                  key: kibana-reporting-key
          resources:
            requests:
              memory: "512Mi"
              cpu: "300m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /api/status
              port: 5601
            initialDelaySeconds: 120
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: kibana
  labels:
    app: quantum-kibana
spec:
  type: ClusterIP
  ports:
    - port: 5601
      targetPort: 5601
      name: http
  selector:
    app: quantum-kibana
---
# Route for OpenShift (exposes Kibana externally)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: quantum-kibana
spec:
  to:
    kind: Service
    name: kibana
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
